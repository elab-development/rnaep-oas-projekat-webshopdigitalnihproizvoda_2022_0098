name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - develop
      - main

jobs:
  test-user-service:
    name: Test User Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd user-service
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          cd user-service
          pytest tests/ -v --tb=short || echo "No tests found"

  test-product-service:
    name: Test Product Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd product-service
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          cd product-service
          pytest tests/ -v --tb=short || echo "No tests found"

  test-order-service:
    name: Test Order Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd order-service
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          cd order-service
          pytest tests/ -v --tb=short || echo "No tests found"

  test-notification-service:
    name: Test Notification Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd notification-service
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          cd notification-service
          pytest tests/ -v --tb=short || echo "No tests found"

  build-user-service:
    name: Build User Service Docker Image
    runs-on: ubuntu-latest
    needs: test-user-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t user-service:latest ./user-service

  build-product-service:
    name: Build Product Service Docker Image
    runs-on: ubuntu-latest
    needs: test-product-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t product-service:latest ./product-service

  build-order-service:
    name: Build Order Service Docker Image
    runs-on: ubuntu-latest
    needs: test-order-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t order-service:latest ./order-service

  build-notification-service:
    name: Build Notification Service Docker Image
    runs-on: ubuntu-latest
    needs: test-notification-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t notification-service:latest ./notification-service

  build-api-gateway:
    name: Build API Gateway Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t api-gateway:latest ./api-gateway